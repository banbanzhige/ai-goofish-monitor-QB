name: 🐛 Bug 报告
description: 提交 Bug 报告以帮助我们改进项目
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽可能详细地填写以下信息，以帮助我们快速定位和修复问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 简明扼要地描述该 Bug
      placeholder: 例如：启动监控任务后，AI 评分始终返回 0 分……
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供复现此 Bug 的详细步骤
      placeholder: |
        1. 进入任务管理页面
        2. 点击"启动"按钮
        3. 等待任务运行完成
        4. 查看结果发现……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望看到的正确行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
    validations:
      required: true

  - type: dropdown
    id: deploy-method
    attributes:
      label: 部署方式
      options:
        - Docker Compose（数据库模式）
        - Docker Compose（本地模式）
        - Docker 命令行
        - Windows 本地部署（start_web_server.bat）
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 项目版本
      description: 你使用的项目版本号
      placeholder: 例如 v1.0.4-beta
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11 / Ubuntu 22.04 / macOS 14

  - type: input
    id: python-version
    attributes:
      label: Python 版本（本地部署时填写）
      placeholder: 例如 3.10.12

  - type: input
    id: browser
    attributes:
      label: 浏览器
      placeholder: 例如 Chrome 120 / Firefox 121

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 如有相关日志（logs/ 目录）或截图，请粘贴在此处
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 其他你认为有助于排查问题的上下文
