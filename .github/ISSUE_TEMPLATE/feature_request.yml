name: ✨ 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的需求，帮助我们持续改进。

  - type: textarea
    id: overview
    attributes:
      label: 功能概述
      description: 简明描述你希望实现的功能
      placeholder: 例如：希望支持多选商品批量发送到指定通知渠道……
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 详细说明
      description: 包括使用场景、解决的问题、建议的实现方式等
      placeholder: |
        使用场景：……
        解决的问题：……
        建议的实现方式：……
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？请简要描述

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、参考链接、或任何其他辅助说明
