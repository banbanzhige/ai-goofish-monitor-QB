name: ❓ 使用疑问
description: 关于项目使用方法或配置的问题
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        提问前请先确认是否已查阅过 [README 文档](https://github.com/banbanzhige/ai-goofish-monitor-QB/blob/master/README.md) 和已有 Issue 列表。

  - type: textarea
    id: question
    attributes:
      label: 你的问题
      description: 清晰描述你遇到的疑问
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提问前检查
      description: 请确认你已查阅以下资料
      options:
        - label: 我已阅读 README 文档
          required: true
        - label: 我已搜索过已有的 Issue 列表
          required: true

  - type: dropdown
    id: deploy-method
    attributes:
      label: 部署方式
      options:
        - Docker Compose（数据库模式）
        - Docker Compose（本地模式）
        - Docker 命令行
        - Windows 本地部署（start_web_server.bat）
        - 其他

  - type: input
    id: version
    attributes:
      label: 项目版本
      placeholder: 例如 v1.0.4-beta

  - type: textarea
    id: extra
    attributes:
      label: 补充说明
      description: 截图、日志、或其他有助于理解你问题的信息
