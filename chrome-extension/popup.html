<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Xianyu Login State Extractor</title>
  <style>
    body {
      width: 420px;
      margin: 0;
      padding: 14px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }
    .container {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #222;
    }
    .hint {
      margin: 0 0 10px 0;
      font-size: 12px;
      color: #666;
      line-height: 1.45;
    }
    .row {
      margin-bottom: 8px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #333;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 13px;
    }
    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }
    .btn-primary { background: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-green { background: #16a34a; }
    .btn-green:hover { background: #15803d; }
    .btn-gray { background: #4b5563; }
    .btn-gray:hover { background: #374151; }
    textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      resize: vertical;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.35;
      background: #fafafa;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      min-height: 18px;
    }
    .status.success {
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #166534;
    }
    .status.error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Xianyu 登录态提取器</h1>
    <p class="hint">推荐复制“账号文件 JSON（自动获取同款）”，可直接作为 state/*.json 使用。</p>

    <div class="row">
      <label for="displayNameInput">账号显示名（可选）</label>
      <input id="displayNameInput" type="text" placeholder="例如：手动获取账号_0401" />
    </div>

    <button id="extractBtn" class="btn btn-primary">1) 采集完整快照</button>
    <button id="copyAccountBtn" class="btn btn-green">2) 复制账号文件 JSON（推荐）</button>
    <button id="copySnapshotBtn" class="btn btn-gray">2') 复制原始快照 JSON</button>

    <textarea id="stateOutput" readonly placeholder="点击“采集完整快照”后会显示 JSON"></textarea>
    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
